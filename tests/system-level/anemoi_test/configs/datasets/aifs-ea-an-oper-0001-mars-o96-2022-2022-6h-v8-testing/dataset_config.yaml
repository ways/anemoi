name: aifs-ea-an-oper-0001-mars-o96-2022-2022-6h-v8-testing

description: 'Copy of
  aifs-ea-an-oper-0001-mars-o96-2017-2017-6h-v8-testing-larsfp, but for dates
  that match the meps dataset.
  '

attribution: ECMWF

licence: CC-BY-4.0

dates:
  start: 2022-01-01 6:00:00
  end: 2022-01-10 18:00:00
  frequency: 6h

input:
  join:
  - mars:
      class: ea
      expver: '0001'
      grid: o96
      levtype: sfc
      param:
      - sp
      - msl
  - mars:
      class: ea
      expver: '0001'
      grid: o96
      level:
      - 50
      - 100
      levtype: pl
      param:
      - r
      - t
  - accumulate:
      period: 6h
      availability: auto
      source:
        mars:
          class: ea
          expver: '0001'
          grid: o96
          param:
          - tp
  - constants:
      param:
      - cos_latitude
      - cos_longitude
      - sin_latitude
      - sin_longitude
      - cos_julian_day
      - cos_local_time
      - sin_julian_day
      - sin_local_time
      - cos_solar_zenith_angle
      template: ${input.join.0.mars}

build:
  group_by: weekly
  additions: true
  use_grib_paramid: false
  variable_naming: default
  remapping:
    param_level: '{param}_{levelist}'
