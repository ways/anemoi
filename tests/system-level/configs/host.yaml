host:
  hostname: "hpc"
  user: "{USER}"
  # log_directory: "/lus/h1resw02/project/prepml/ecflow_server/logs"
  # log_directory: "%ECF_HOME%"
  log_directory: "{OUTPUT_ROOT_SUITE}/logs"
  workdir: "$TMPDIR"
  submit_arguments:
    defaults:
      memory_per_cpu: 8Gb
      job_name: "%FAMILY1:NOT_DEF%_%TASK%"
      tmpdir_size: 20Gb
    cpu_job:
      queue: nf
      total_tasks: 1
    gpu_job:
      queue: ng
      time: "00:20:00"
      RAW_PRAGMA:
        - "#SBATCH --gpus=1"
        - "#SBATCH --gres=gpu:1"
